name: Security Scan with OWASP ZAP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan the ClickSeguro application
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install

      - name: Start Application
        run: |
          npm start &
          # Wait for the app to be ready
          npx wait-on http://localhost:8080 --timeout 60000

      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'http://localhost:8080'
          fail_action: false
          cmd_options: '-J report_json.json'
          artifact_name: 'zap-report'

      - name: Check for High/Critical Vulnerabilities
        run: |
          # The report is generated inside the docker container, but the action copies it back.
          # We check the JSON report for any risk level >= 3 (High) or 4 (Critical)
          # ZAP risk levels: 0: Informational, 1: Low, 2: Medium, 3: High
          if [ -f "report_json.json" ]; then
            HIGH_ALERTS=$(jq '[.site[].alerts[] | select(.riskcode | tonumber >= 3)] | length' report_json.json)
            echo "Total High/Critical alerts: $HIGH_ALERTS"
            if [ "$HIGH_ALERTS" -gt 0 ]; then
              echo "Vulnerabilidades críticas ou altas encontradas! Falhando o pipeline."
              exit 1
            fi
          else
            echo "Relatório JSON não encontrado."
            exit 1
          fi

      - name: Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: |
            report_json.json
            zap_report.html
