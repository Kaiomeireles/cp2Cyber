name: Security Scan with OWASP ZAP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan the ClickSeguro application
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install

      - name: Start Application
        run: |
          npm start &
          # Wait for the app to be ready
          npx wait-on http://localhost:8080 --timeout 60000

      - name: ZAP Scan
        run: |
          # Criando o diretório de trabalho para o ZAP
          mkdir -p zap_out
          # Rodando o ZAP via Docker com --network="host" para acessar o localhost:8080 do runner
          docker run --network="host" -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:8080 \
            -J report_json.json \
            -r zap_report.html || true
          
      - name: Check for High/Critical Vulnerabilities
        run: |
          if [ -f "report_json.json" ]; then
            # Filtra por vulnerabilidades com risco >= 3 (High)
            HIGH_ALERTS=$(jq '[.site[].alerts[] | select(.riskcode | tonumber >= 3)] | length' report_json.json)
            echo "Vulnerabilidades de nível Alto/Crítico encontradas: $HIGH_ALERTS"
            if [ "$HIGH_ALERTS" -gt 0 ]; then
              echo "Falha de segurança detectada! Bloqueando o pipeline."
              exit 1
            fi
          else
            echo "Erro: Relatório JSON não foi gerado."
            exit 1
          fi

      - name: Upload Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: |
            report_json.json
            zap_report.html
